---
- name: "Dock - Size"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: float
    value: "{{ Dock_TileSize }}"
  when: Dock_TileSize is defined
  notify: restart Dock

- name: "Dock - Magnification"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: magnification
    type: bool
    value: "{{ Dock_Magnification }}"
  when: Dock_Magnification is defined
  notify: restart Dock

- name: "Dock - Icon size of magnified Dock items"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: largesize
    type: float
    value: "{{ Dock_LargeSize }}"
  when: Dock_LargeSize is defined
  notify: restart Dock

- name: "Dock - Position on screen"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: orientation
    type: string
    value: "{{ Dock_Orientation }}"
  when: Dock_Orientation is defined
  notify: restart Dock

- name: "Dock - Minimization effect"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: mineffect
    type: string
    value: "{{ Dock_MinEffect }}"
  when: Dock_MinEffect is defined
  notify: restart Dock

- name: "Dock - Window's title bar double-click action"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: AppleActionOnDoubleClick
    type: string
    value: "{{ Dock_AppleActionOnDoubleClick }}"
  when: Dock_AppleActionOnDoubleClick is defined
  notify: restart Dock

- name: "Dock - Minimize windows into application icon"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: minimize-to-application
    type: bool
    value: "{{ Dock_MinimizeToApplication }}"
  when: Dock_MinimizeToApplication is defined
  notify: restart Dock

- name: "Dock - Animate opening applications"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: launchanim
    type: bool
    value: "{{ Dock_LaunchAnim }}"
  when: Dock_LaunchAnim is defined
  notify: restart Dock

- name: "Dock - Automatically hide and show"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: "{{ Dock_Autohide }}"
  when: Dock_Autohide is defined
  notify: restart Dock

- name: "Dock - Show indicator for open applications"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: show-process-indicators
    type: bool
    value: "{{ Dock_ShowProcessIndicators }}"
  when: Dock_ShowProcessIndicators is defined
  notify: restart Dock

- name: "Dock - Display translucent Dock icons for hidden applications"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: showhidden
    type: bool
    value: "{{ Dock_ShowHidden }}"
  when: Dock_ShowHidden is defined
  notify: restart Dock
