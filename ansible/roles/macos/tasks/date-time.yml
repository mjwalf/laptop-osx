---
# `systemsetup` calls require root and, on modern macOS, Full Disk Access for
# the agent running them. They print "DSCL[...]" warnings if missing privs but
# usually still set the value. We keep the gating logic so reruns are idempotent.

- name: "Date Time - Get the current timezone"
  ansible.builtin.command: systemsetup -gettimezone
  become: true
  register: dt_tz_result
  changed_when: false
  failed_when: false
  when: DateTime_TimeZone is defined

- name: "Date Time - Set the timezone"
  ansible.builtin.command: "systemsetup -settimezone '{{ DateTime_TimeZone }}'"
  become: true
  when:
    - DateTime_TimeZone is defined
    - dt_tz_result.stdout is defined
    - DateTime_TimeZone not in dt_tz_result.stdout
  notify: restart MenuBar

- name: "Date Time - Set date and time automatically"
  ansible.builtin.command: "systemsetup -setusingnetworktime {{ DateTime_AutomaticDateTime }}"
  become: true
  when: DateTime_AutomaticDateTime is defined
  register: dt_ntp_result
  changed_when: "'already' not in dt_ntp_result.stdout | default('')"
  failed_when: false
  notify: restart MenuBar

- name: "Date Time - Get the current time server"
  ansible.builtin.command: systemsetup -getnetworktimeserver
  become: true
  register: dt_server_result
  changed_when: false
  failed_when: false
  when: DateTime_TimeServer is defined

- name: "Date Time - Set time server"
  ansible.builtin.command: "systemsetup -setnetworktimeserver '{{ DateTime_TimeServer }}'"
  become: true
  when:
    - DateTime_TimeServer is defined
    - dt_server_result.stdout is defined
    - DateTime_TimeServer not in dt_server_result.stdout
  notify: restart MenuBar

- name: "Date Time - Menu bar clock format"
  community.general.osx_defaults:
    domain: com.apple.menuextra.clock
    key: DateFormat
    type: string
    value: "{{ DateTime_DateFormat }}"
  when: DateTime_DateFormat is defined
  notify: restart MenuBar

- name: "Date Time - Flash the time separators"
  community.general.osx_defaults:
    domain: com.apple.menuextra.clock
    key: FlashDateSeparators
    type: bool
    value: "{{ DateTime_FlashDateSeparators }}"
  when: DateTime_FlashDateSeparators is defined
  notify: restart MenuBar

- name: "Date Time - Analog menu bar clock"
  community.general.osx_defaults:
    domain: com.apple.menuextra.clock
    key: IsAnalog
    type: bool
    value: "{{ DateTime_IsAnalog }}"
  when: DateTime_IsAnalog is defined
  notify: restart MenuBar
