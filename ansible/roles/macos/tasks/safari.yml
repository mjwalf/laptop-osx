---
# NOTE: Modern Safari is signed and many of these keys are SIP/TCC protected.
# Tasks may report "ok" but the setting will be ignored by Safari at launch.
# We keep them here for parity with older macOS but expect partial success.

- name: "Safari - General - Safari opens with"
  community.general.osx_defaults:
    domain: com.apple.safari
    key: "{{ item.key }}"
    type: bool
    value: "{{ item.value }}"
  loop:
    - { name: "A new window",                       key: OpenPrivateWindowWhenNotRestoringSessionAtLaunch, value: false }
    - { name: "A new window",                       key: AlwaysRestoreSessionAtLaunch,                     value: false }
    - { name: "A new private window",               key: OpenPrivateWindowWhenNotRestoringSessionAtLaunch, value: true }
    - { name: "A new private window",               key: AlwaysRestoreSessionAtLaunch,                     value: false }
    - { name: "All windows from last session",      key: OpenPrivateWindowWhenNotRestoringSessionAtLaunch, value: false }
    - { name: "All windows from last session",      key: AlwaysRestoreSessionAtLaunch,                     value: true }
  when:
    - Safari_OpensWith is defined
    - item.name == Safari_OpensWith
  notify: restart Safari

- name: "Safari - General - New windows open with"
  community.general.osx_defaults:
    domain: com.apple.safari
    key: NewWindowBehavior
    type: int
    value: "{{ Safari_NewWindowBehavior }}"
  when: Safari_NewWindowBehavior is defined
  notify: restart Safari

- name: "Safari - General - New tabs open with"
  community.general.osx_defaults:
    domain: com.apple.safari
    key: NewTabBehavior
    type: int
    value: "{{ Safari_NewTabBehavior }}"
