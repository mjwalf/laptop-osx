  community.general.osx_defaults:
    domain: com.apple.safari
    key: "{{ item }}"
    type: bool
    value: "{{ Safari_ShowDeloperMenu }}"
  loop:
    - IncludeDevelopMenu
    - WebKitDeveloperExtrasEnabledPreferenceKey
    - com.apple.Safari.ContentPageGroupIdentifier.WebKit2DeveloperExtrasEnabled
