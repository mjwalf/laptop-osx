---
- name: "Mission Control - Automatically rearrange Spaces based on most recent use"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: mru-spaces
    type: bool
    value: "{{ MissionControl_MruSpaces }}"
  when: MissionControl_MruSpaces is defined
  notify: restart Dock

- name: "Mission Control - Switch to a Space with open windows when activating an app"
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleSpacesSwitchOnActivate
    type: bool
    value: "{{ MissionControl_SwitchOnActivate }}"
  when: MissionControl_SwitchOnActivate is defined

- name: "Mission Control - Group windows by application"
  community.general.osx_defaults:
    domain: com.apple.dock
    key: expose-group-apps
    type: bool
    value: "{{ MissionControl_GroupByApp }}"
  when: MissionControl_GroupByApp is defined
  notify: restart Dock

- name: "Mission Control - Displays have separate Spaces"
  community.general.osx_defaults:
    domain: com.apple.spaces
    key: spans-displays
    type: bool
    value: "{{ MissionControl_SpansDisplays }}"
  when: MissionControl_SpansDisplays is defined
