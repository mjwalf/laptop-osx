---
# `include:` was removed in Ansible 2.16. Use import_tasks for static
# inclusion (these are conditional on _Enabled flags from vars/macos.yml).
#
# The bluetooth, dashboard, desktop-screen-saver and icloud task files have
# been dropped: they target deprecated/removed macOS features and consistently
# fail on modern macOS (Dashboard since Catalina, menuExtras-based bluetooth
# in Control Center, deprecated iCloud key, fragile sqlite write to a
# protected location).

- name: Apple App Store / Software Update settings
  ansible.builtin.import_tasks: app-store.yml
  tags: [app-store]
  when: AppStore_Enabled | default(false) | bool

- name: Date & Time settings
  ansible.builtin.import_tasks: date-time.yml
  tags: [date-time]
  when: DateTime_Enabled | default(false) | bool

- name: Display settings
  ansible.builtin.import_tasks: displays.yml
  tags: [displays]
  when: Displays_Enabled | default(false) | bool

- name: Dock settings
  ansible.builtin.import_tasks: dock.yml
  tags: [dock]
  when: Dock_Enabled | default(false) | bool

- name: Finder settings
  ansible.builtin.import_tasks: finder.yml
  tags: [finder]
  when: Finder_Enabled | default(false) | bool

- name: General appearance / behaviour settings
  ansible.builtin.import_tasks: general.yml
  tags: [general]
  when: General_Enabled | default(false) | bool

- name: Keyboard settings
  ansible.builtin.import_tasks: keyboard.yml
  tags: [keyboard]
  when: Keyboard_Enabled | default(false) | bool

- name: Language & Region settings
  ansible.builtin.import_tasks: language-region.yml
  tags: [language-region]
  when: LanguageRegion_Enabled | default(false) | bool

- name: Mission Control settings
  ansible.builtin.import_tasks: mission-control.yml
  tags: [mission-control]
  when: MissionControl_Enabled | default(false) | bool

- name: Safari settings
  ansible.builtin.import_tasks: safari.yml
  tags: [safari]
  when: Safari_Enabled | default(false) | bool
