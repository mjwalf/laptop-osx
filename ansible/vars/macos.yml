---
# macOS System Settings managed by the `macos` role.
#
# Each section has an `_Enabled` flag. Set to false (or omit) to skip the
# whole section. Most defaults below are conservative; opt in by flipping
# the flag.

# ---------- App Store / Software Update ----------
AppStore_Enabled: false
AppStore_AutomaticCheckEnabled: true
AppStore_AutomaticDownload: true
AppStore_AutoUpdate: true
AppStore_AutoUpdateRestartRequired: false
AppStore_ConfigDataInstall: false
AppStore_CriticalUpdateInstall: true
AppStore_ScheduleFrequency: 7
AppStore_ShowDebugMenu: false

# ---------- Date & Time ----------
DateTime_Enabled: true
DateTime_TimeZone: "Australia/Sydney"
DateTime_AutomaticDateTime: "on"
DateTime_TimeServer: "time.apple.com"
DateTime_DateFormat: "EEE d MMM  HH:mm"   # 24h with day-of-week
DateTime_FlashDateSeparators: false
DateTime_IsAnalog: false

# ---------- Displays ----------
Displays_Enabled: false
Displays_AppleFontSmoothing: 2
Displays_DisplayResolutionEnabled: true
Displays_ShowInMenuBarIfPresent: true

# ---------- Dock ----------
Dock_Enabled: true
Dock_TileSize: 36
Dock_Magnification: false
Dock_LargeSize: 64
Dock_Orientation: "bottom"
Dock_MinEffect: "scale"
Dock_AppleActionOnDoubleClick: "Maximize"
Dock_MinimizeToApplication: true
Dock_LaunchAnim: true
Dock_Autohide: true
Dock_ShowProcessIndicators: true
Dock_ShowHidden: false

# ---------- Finder ----------
Finder_Enabled: true
Finder_ShowHardDrivesOnDesktop: false
Finder_ShowExternalHardDrivesOnDesktop: true
Finder_ShowRemovableMediaOnDesktop: true
Finder_ShowMountedServersOnDesktop: false
Finder_NewWindowTarget: "PfHm"            # Open Home in new windows
Finder_FinderSpawnTab: true
Finder_AppleShowAllExtensions: true
Finder_FXEnableExtensionChangeWarning: true
Finder_WarnOnEmptyTrash: false
Finder_FXDefaultSearchScope: "SCcf"       # search current folder
Finder_AppleShowAllFiles: false
Finder_FXPreferredViewStyle: "Nlsv"       # list view
Finder_FXPreferredGroupBy: "None"
Finder_ShowTabView: true
Finder_ShowPathbar: true
Finder_ShowStatusBar: false
Finder_ShowSidebar: true
Finder_ColumnShowIcons: true
Finder_FXShowPosixPathInTitle: true

# ---------- General ----------
General_Enabled: true
General_AppleAquaColorVariant: 1
General_AppleInterfaceStyle: "Dark"
General_AutoHideMenuBar: false
General_AppleHighlightColor: "Graphite"
General_SidebarIconSize: 1
General_AppleShowScrollBars: "Automatic"
General_AppleScrollerPagingBehavior: 0
General_NSCloseAlwaysConfirmsChanges: false
General_CloseWindowsWhenQuittingApp: false
General_NSScrollAnimationEnabled: true

# ---------- Keyboard ----------
Keyboard_Enabled: true
Keyboard_KeyRepeat: 2                      # Fast
Keyboard_InitialKeyRepeat: 15              # Short
Keyboard_fnState: false
Keyboard_AutomaticSpellingCorrectionEnabled: false
Keyboard_AutomaticQuoteSubstitutionEnabled: false
Keyboard_AutomaticDashSubstitutionEnabled: false
Keyboard_AppleKeyboardUIMode: 3            # Full keyboard access
Keyboard_PowerButtonSleepsSystem: false
Keyboard_PressAndHoldEnabled: false        # disable so key repeat works in vim etc.

# ---------- Language & Region ----------
LanguageRegion_Enabled: false
LanguageRegion_Locale: "en_AU@currency=AUD"
LanguageRegion_MeasurementUnits: "Centimeters"
LanguageRegion_Force24HourTime: true
LanguageRegion_MetricUnits: true

# ---------- Mission Control ----------
MissionControl_Enabled: false
MissionControl_MruSpaces: false
MissionControl_SwitchOnActivate: true
MissionControl_GroupByApp: true
MissionControl_SpansDisplays: true

# ---------- Safari ----------
# Disabled by default. On modern macOS most of these keys are SIP-protected
# and ignored even though `defaults` accepts them. Enable only if you've
# granted Full Disk Access to the running shell.
Safari_Enabled: false
Safari_OpensWith: "All windows from last session"
Safari_NewWindowBehavior: 4
Safari_NewTabBehavior: 4
Safari_HistoryAgeInDaysLimit: 365
Safari_DownloadsClearingPolicy: 1
Safari_AutoOpenSafeDownloads: false
Safari_TabCreationPolicy: 1
Safari_CommandClickMakesTabs: true
Safari_OpenNewTabsInFront: false
Safari_Command1Through9SwitchesTabs: true
Safari_AutoFillFromAddressBook: true
Safari_AutoFillPasswords: false
Safari_AutoFillCreditCardData: false
Safari_AutoFillMiscellaneousForms: false
Safari_IncludeSearchSuggestions: true
Safari_WebsiteSpecificSearchEnabled: true
Safari_PreloadTopHit: false
Safari_ShowFavoritesUnderSmartSearchField: true
Safari_WarnAboutFraudulentWebsites: true
Safari_SendDoNotTrackHTTPHeader: true
Safari_CanPromptForPushNotifications: false
Safari_InstallExtensionUpdatesAutomatically: true
Safari_ShowFullURLInSmartSearchField: true
Safari_ShowDeloperMenu: true
Safari_ShowFavoritesBar: false
Safari_AlwaysShowTabBar: true
Safari_ShowOverlayStatusBar: false
Safari_ShowSidebarInNewWindows: false
Safari_ShowFrequentlyVisitedSites: true
