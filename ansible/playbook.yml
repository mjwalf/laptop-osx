---
- name: Provision macOS laptop
  hosts: laptop
  gather_facts: true

  pre_tasks:
    - name: "Sanity check: install_user variable is set"
      ansible.builtin.assert:
        that:
          - install_user is defined
          - install_user | length > 0
        fail_msg: "Run with -e install_user=$(whoami)"

  vars_files:
    - vars/macos.yml

  roles:
    - role: homebrew
      tags: [homebrew, brew, casks]
    - role: dotfiles
      tags: [dotfiles]
    - role: macos
      tags: [macos]
